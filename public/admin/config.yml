backend:
  name: github
  repo: TimmyByDay/vch
  branch: main
  site_domain: localhost:4321
  base_url: http://localhost:4321
  auth_endpoint: oauth

media_folder: src/assets/img
public_folder: /decap-images

collections:
  - name: "drinks"
    label: "Drinks"
    folder: "src/content/drinks"
    create: true
    extension: json
    format: json
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - {
          label: "Category",
          name: "category",
          widget: "select",
          options:
            [
              "coffee",
              "specialty-coffee",
              "tea",
              "hot-chocolate",
              "cold-drinks",
              "smoothies",
              "soft-drinks",
              "other",
            ],
        }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Price", name: "price", widget: "string" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Vegan", name: "vegan", widget: "boolean", default: false }

  - name: "food"
    label: "Food"
    folder: "src/content/food"
    create: true
    extension: json
    format: json
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - {
          label: "Category",
          name: "category",
          widget: "select",
          options:
            [
              "panini",
              "baguette",
              "jacket-potato",
              "toasties",
              "sandwiches",
              "wraps",
              "soups",
              "breakfast",
              "sides",
              "other",
            ],
        }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Price", name: "price", widget: "string" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Vegan", name: "vegan", widget: "boolean", default: false }

  - name: "cakes"
    label: "Cakes"
    folder: "src/content/cakes"
    create: true
    extension: json
    format: json
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Price", name: "price", widget: "string" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Vegan", name: "vegan", widget: "boolean", default: false }

  - name: "specials"
    label: "Specials"
    folder: "src/content/specials"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Start Date", name: "startDate", widget: "datetime" }
      - { label: "End Date", name: "endDate", widget: "datetime", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "business"
    label: "Business"
    folder: "src/content/business"
    create: true
    extension: json
    format: json
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Value", name: "value", widget: "string" }

  - name: "delivery"
    label: "Delivery Links"
    label_singular: "Delivery Link"
    folder: "src/content/delivery"
    create: true
    identifier_field: "provider"
    extension: json
    format: json
    fields:
      - {
          label: "Provider",
          name: "provider",
          widget: "select",
          options: ["Deliveroo", "Uber Eats", "Just Eat"],
        }
      - { label: "URL", name: "url", widget: "string" }
      - { label: "Brand Color", name: "color", widget: "string", pattern: ["^#[0-9A-Fa-f]{6}$", "Must be a hex color e.g. #00CCBC"] }
      - { label: "Order", name: "order", widget: "number", value_type: "int", default: 0 }

