backend:
  name: test-repo

collections:
  - name: "drinks"
    label: "Drinks"
    folder: "src/content/drinks"
    create: true
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - {
          label: "Category",
          name: "category",
          widget: "select",
          options: ["coffee", "specialty", "tea", "other"],
        }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Price", name: "price", widget: "string", required: false }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }

  - name: "food"
    label: "Food"
    folder: "src/content/food"
    create: true
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - {
          label: "Category",
          name: "category",
          widget: "select",
          options: ["panini", "baguette", "jacket-potato", "other"],
        }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Price", name: "price", widget: "string", required: false }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }

  - name: "cakes"
    label: "Cakes"
    folder: "src/content/cakes"
    create: true
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Price", name: "price", widget: "string", required: false }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }

  - name: "specials"
    label: "Specials"
    folder: "src/content/specials"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Start Date", name: "startDate", widget: "datetime" }
      - { label: "End Date", name: "endDate", widget: "datetime", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "business"
    label: "Business"
    folder: "src/content/business"
    create: false
    delete: false
    slug: "business"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Address", name: "address", widget: "string" }
      - { label: "Phone", name: "phone", widget: "string" }
      - { label: "Email", name: "email", widget: "string", required: false }
      - { label: "Hours", name: "hours", widget: "string" }
      - {
          label: "Facebook URL",
          name: "facebookUrl",
          widget: "string",
          required: false,
        }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "gallery"
    label: "Gallery"
    folder: "src/content/gallery"
    create: true
    fields:
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Caption", name: "caption", widget: "string", required: false }
